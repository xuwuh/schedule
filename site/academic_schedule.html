<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Расписание занятий</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>


<body>
  <div class="title">
    <h1>Model for automatic scheduling</h1>
  </div>
  
  <div class="info_form">
    <form onsubmit="return validateForm()">
      <div class="form_text">
        <h2>Вы можете загрузить файл</h2>
        <h3>или заполнить форму</h3>
      </div>

      <div class="questions_type">Аудитории:</div>
      <input type="number" id="aud_n" name="aud_n" placeholder="номер кабинета" class="text_line">
      <input type="number" id="aud_cap" name="aud_cap" placeholder="вмещаемость (по кол-ву групп)" class="text_line">
      <div class="questions">Компьтерный класс?</div>
      <select id="aud_texn" name="aud_texn" class="text_line">
        <option value="0">Нет</option>
        <option value="1">Да</option>
      </select>

      <div class="questions_type">Преподаватель</div>
      <input type="text" id="tech_name" name="tech_name" placeholder="ФИО" class="text_line">
      <input type="text" id="tech_subj_1" name="tech_subj_1" placeholder="преподает ..." class="text_line">

      <div class="questions_type">Предметы</div>
      <input type="text" id="subj_name" name="subj_name" placeholder="название предмета" class="text_line">
      <input type="number" id="subj_h" name="subj_h" placeholder="часы в неделю" class="text_line">
      <div class="questions">Тип занятия</div>
      <select id="subj_type" name="subj_type" class="text_line">
        <option value="1">Лекция</option>
        <option value="0">Семинар</option>
      </select>

      <div class="questions_type">Группы</div>
      <input type="number" id="gr_n" name="gr_n" placeholder="номер группы" class="text_line">
      <input type="number" id="gr_c" nmae="gr_c" placeholder="курс" class="text_line">
    </form>
  </div>

  <a href="index.html" class="btn">назад</a>
  <a href="result.html" class="btn">recult</a>

</body>
</html>
